<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookMyMovie AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <main class="mx-auto grid min-h-screen max-w-7xl gap-6 p-4 lg:grid-cols-[380px_1fr] lg:p-6">
      <section class="flex min-h-[560px] flex-col rounded-lg border border-zinc-800 bg-zinc-900">
        <div class="border-b border-zinc-800 p-4">
          <h1 class="text-2xl font-semibold">BookMyMovie AI</h1>
          <p class="mt-1 text-sm text-zinc-400">Chat, find shows, choose seats, book tickets.</p>
        </div>
        <div id="chatLog" class="flex-1 space-y-3 overflow-y-auto p-4"></div>
        <form id="chatForm" class="flex gap-2 border-t border-zinc-800 p-3">
          <input
            id="chatInput"
            class="min-w-0 flex-1 rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm outline-none focus:border-emerald-500"
            placeholder="Ask: Show me Avatar timings today"
          />
          <button class="rounded-md bg-emerald-500 px-4 py-2 text-sm font-semibold text-zinc-950">Send</button>
        </form>
      </section>

      <section class="space-y-5">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h2 class="text-xl font-semibold">Running Movies</h2>
            <p class="text-sm text-zinc-400">TMDB CSV se seeded demo catalogue.</p>
          </div>
          <div class="flex gap-2">
            <input
              id="movieSearch"
              class="rounded-md border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm outline-none focus:border-emerald-500"
              placeholder="Search movie or genre"
            />
            <button id="searchBtn" class="rounded-md border border-zinc-700 px-3 py-2 text-sm">Search</button>
          </div>
        </div>
        <div id="movieGrid" class="grid gap-3 md:grid-cols-2 xl:grid-cols-3"></div>
        <div id="showPanel" class="hidden rounded-lg border border-zinc-800 bg-zinc-900 p-4"></div>
      </section>
    </main>
    <script src="./js/script.js"></script>
  </body>
</html>
